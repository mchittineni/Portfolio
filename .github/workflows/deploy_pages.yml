name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default-deny: read-only at the top level; the deploy job opts into the rest.
permissions:
  contents: read

# One concurrent Pages deploy; don't cancel an in-flight publish.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        # Project Pages serve under /<repo>/, so build with that base URL.
        # (For a custom domain / user site served at root, set this to "/".)
        env:
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run generate

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Scopes needed only to publish: write the Pages deployment + mint the OIDC token.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
