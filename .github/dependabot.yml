version: 2
updates:
  # JavaScript / Nuxt toolchain
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk bumps into one PR to cut review noise.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions — keeps the SHA pins (and their version comments) current.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - '*'
