# Cloudflare configuration for the statically-generated Nuxt site.
#
# This uses Workers **Static Assets**: an assets-only Worker (no server code)
# that serves the prerendered output (`.output/public`) directly at the edge.
# It is the modern replacement for legacy "Workers Sites", so it avoids the
# `No such module "__STATIC_CONTENT_MANIFEST"` error — and it works with the
# `wrangler versions upload` / `wrangler deploy` commands a Workers Build runs.
#
# Build command (Cloudflare dashboard → Build configuration): npm run generate
name               = "web-portfolio"
compatibility_date = "2026-06-01"

[assets]
directory = ".output/public"
# Serve the prerendered 404.html for unknown paths (parity with CloudFront).
not_found_handling = "404-page"
